<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Стрит-арт карта</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Стили -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Стрит&#8209;арт карта</h1>
    <div class="count">объектов: <span id="art-count">0</span></div>
  </header>

  <div id="map"></div>

  <!-- Оверлей для мобильных -->
  <div id="overlay"></div>

  <!-- Боковая панель -->
  <div id="panel">
    <button id="close-btn" title="Закрыть">✕</button>
    <img id="panel-img" class="panel-photo" src="" alt="" style="display:none" />
    <div id="panel-placeholder" class="panel-photo-placeholder">нет фото</div>
    <div class="panel-body">
      <div id="panel-tag" class="panel-tag">стрит-арт</div>
      <div id="panel-title" class="panel-title"></div>
      <div id="panel-desc" class="panel-desc"></div>
      <div class="panel-meta">
        <div class="meta-item">
          <label>Автор</label>
          <span id="panel-author">—</span>
        </div>
        <div class="meta-item">
          <label>Дата</label>
          <span id="panel-date">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Лайтбокс -->
  <div id="lightbox">
    <button id="lightbox-close" title="Закрыть">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <!-- Данные и логика -->
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>

</body>
</html>
