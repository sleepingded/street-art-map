<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Стрит-арт карта</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Стили -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Стрит&#8209;арт карта</h1>
    <button class="count" id="list-toggle" title="Показать все объекты">объектов: <span id="art-count">0</span> &#9776;</button>
  </header>

  <div id="map"></div>

  <!-- Оверлей для мобильных -->
  <div id="overlay"></div>

  <!-- Боковая панель -->
  <div id="panel">
    <button id="close-btn" title="Закрыть">✕</button>

    <!-- Карточка объекта -->
    <div id="artwork-view">
      <!-- Галерея -->
      <div id="panel-gallery">
        <img id="panel-img" class="panel-photo" src="" alt="" style="display:none" />
        <div id="panel-placeholder" class="panel-photo-placeholder">нет фото</div>
        <button id="gallery-prev" class="gallery-btn" style="display:none">&#8249;</button>
        <button id="gallery-next" class="gallery-btn" style="display:none">&#8250;</button>
        <div id="gallery-counter" style="display:none"></div>
      </div>
      <div class="panel-body">
        <div id="panel-tag" class="panel-tag">стрит-арт</div>
        <div id="panel-title" class="panel-title"></div>
        <div id="panel-desc" class="panel-desc"></div>
        <div class="panel-meta">
          <div class="meta-item">
            <label>Авторы</label>
            <div id="panel-authors"></div>
          </div>
          <div class="meta-item">
            <label>Дата</label>
            <span id="panel-date">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Профиль автора -->
    <div id="author-view" style="display:none; flex-direction:column; flex:1; overflow:hidden">
      <div id="author-photo-wrap">
        <img id="author-photo" src="" alt="" style="display:none" />
        <div id="author-photo-placeholder">?</div>
      </div>
      <div class="panel-body">
        <div class="panel-tag">автор</div>
        <div id="author-name" class="panel-title"></div>
        <div id="author-bio" class="panel-desc"></div>
        <div id="author-links"></div>
      </div>
    </div>

  </div>

  <!-- Список объектов -->
  <div id="list-panel">
    <div id="list-header">
      <span id="list-title">Все объекты</span>
      <button id="list-close" title="Закрыть">✕</button>
    </div>

    <!-- Сортировка и фильтры -->
    <div id="list-controls">
      <div id="list-sort">
        <button class="sort-btn active" data-sort="date-desc">Новые</button>
        <button class="sort-btn" data-sort="date-asc">Старые</button>
        <button class="sort-btn" data-sort="title">А→Я</button>
      </div>
      <div id="list-authors"></div>
    </div>

    <ul id="list-items"></ul>
  </div>

  <!-- Лайтбокс -->
  <div id="lightbox">
    <button id="lightbox-close" title="Закрыть">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <!-- Данные и логика -->
  <script src="js/data.js"></script>
  <script src="js/authors.js"></script>
  <script src="js/map.js"></script>

</body>
</html>
